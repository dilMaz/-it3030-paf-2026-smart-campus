spring.application.name=smart-campus-api
server.port=8080
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://smartcampus:smart123@cluster0.jkwvdov.mongodb.net/smart_campus_db?retryWrites=true&w=majority&appName=Cluster0}
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:smartcampus;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
spring.datasource.username=${MYSQL_USERNAME:sa}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
security.bcrypt.strength=10
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
app.admin.email=${APP_ADMIN_EMAIL:}
app.avatar-upload-dir=${AVATAR_UPLOAD_DIR:uploads/avatars}

